[build]
  publish   = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/photos/delete"
  to   = "/.netlify/functions/photos-delete"
  status = 200

[[redirects]]
  from = "/api/photos"
  to   = "/.netlify/functions/photos"
  status = 200

[[redirects]]
  from = "/api/analyze"
  to   = "/.netlify/functions/analyze"
  status = 200

[[redirects]]
  from = "/api/chat"
  to   = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/session"
  to   = "/.netlify/functions/session"
  status = 200

[functions]
  node_bundler = "esbuild"
